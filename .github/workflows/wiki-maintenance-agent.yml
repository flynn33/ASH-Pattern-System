name: Wiki Maintenance Agent

# Sentinel workflow. Maintains wiki quality and freshness by checking:
#   - required wiki pages and headings
#   - navigation integrity (Home and _Sidebar)
#   - internal wiki-link validity
#   - drift signal when canonical docs/specs/governance changed without wiki updates
#   - automatic sync from wiki/ to <repo>.wiki.git on push to main
#
# See governance/github-agents-governance.md for policy.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

env:
  REPORT_ONLY: "0"

jobs:
  wiki-maintenance:
    name: Wiki maintenance check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Run wiki maintenance check
        run: python3 .github/scripts/wiki_maintenance_check.py

  wiki-sync:
    name: Wiki sync
    runs-on: ubuntu-latest
    needs: wiki-maintenance
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Detect wiki changes
        id: detect
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git show --name-only --format= "${{ github.sha }}" | grep '^wiki/' || true)
          else
            CHANGED=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep '^wiki/' || true)
          fi

          if [ -n "$CHANGED" ]; then
            echo "has_wiki_changes=true" >> "$GITHUB_OUTPUT"
            printf '%s\n' "$CHANGED"
          else
            echo "has_wiki_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync wiki pages to GitHub Wiki repository
        if: steps.detect.outputs.has_wiki_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          TMP_DIR="$(mktemp -d)"
          WIKI_DIR="$TMP_DIR/wiki-repo"

          if ! git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPO}.wiki.git" "$WIKI_DIR"; then
            echo "::warning::Could not clone ${REPO}.wiki.git (wiki may be disabled). Skipping wiki sync."
            exit 0
          fi

          # Preserve destination .git metadata while mirroring wiki pages.
          rsync -a --delete --exclude '.git' wiki/ "$WIKI_DIR/"

          cd "$WIKI_DIR"
          if git diff --quiet; then
            echo "No wiki changes to publish."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Sync wiki from main repository"
          git push
