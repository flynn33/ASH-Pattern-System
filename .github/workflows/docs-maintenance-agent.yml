name: Docs Maintenance Agent

# Sentinel workflow. Maintains README/docs/governance/handoff integrity by checking:
#   - required canonical docs presence and required headings
#   - README baseline markers and repository-map path validity
#   - internal markdown-link integrity across docs surfaces
#   - drift signal when canonical docs/specs change without README updates
#
# See governance/github-agents-governance.md for policy.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  REPORT_ONLY: "0"

permissions:
  contents: read

jobs:
  docs-maintenance:
    name: Docs maintenance check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Run docs maintenance check
        run: python3 .github/scripts/docs_maintenance_check.py
