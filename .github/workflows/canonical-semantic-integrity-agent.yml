name: Canonical Semantic Integrity Agent

# Sentinel workflow. Checks:
#   - No non-canonical math-language reintroduction in active canonical files
#   - No language claiming handoff templates override or are canonical authority
#   - No contradictory status language across README, roadmap, and ai-coding-handoff
#
# See governance/github-agents-governance.md for full policy.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  REPORT_ONLY: "0"

permissions:
  contents: read

jobs:
  semantic-integrity:
    name: Canonical semantic integrity check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.11"

      - name: Run canonical semantic integrity check
        run: python3 .github/scripts/semantic_integrity_check.py
